name: stage4_online_external_watch_stop_aligned_fallback_probe_low_memory
runner_script: scripts/run_stage4_online.py
python_executable: "{stage4_python_executable}"
args:
  --output-dir: "{stage4_output_dir}"
  --scenario-manifest: "{scenario_manifest}"
  --spawn-ego-if-missing: "true"
  --carla-pythonapi-root: "D:/carla/PythonAPI"
  --num-ticks: "10"
  --warmup-ticks: "0"
  --fixed-delta-seconds: "0.10"
  --route-option: "{route_option}"
  --preferred-lane: "{preferred_lane}"
  --route-priority: "{route_priority}"
  --stage1-launch-mode: "external_watch"
  --stage1-session-root: "{stage1_session_dir}"
  --external-watch-start-sequence-index: "119"
  --stop-alignment-enabled: "true"
  --stop-alignment-sample-name: "sample_000119"
  --stop-alignment-request-frame: "60120"
  --stop-alignment-expected-gap-m: "5.056554794311523"
  --stop-alignment-gap-tolerance-m: "3.0"
  --stop-alignment-source: "manifest_distance_minus_expected_stop_gap"
  --sensor-rig-profile: "low_memory_shadow"
  --shadow-mode: "true"
  --fallback-probe-tick: "6"
  --fallback-probe-trigger: "hard_timeout"
